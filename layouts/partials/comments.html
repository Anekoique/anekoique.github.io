<!-- {{- /* Giscus Comments */ -}} -->
{{ if .Site.Params.giscus.repo }}
<div class="giscus-comments">
    <script src="https://giscus.app/client.js"
        data-repo="{{ .Site.Params.giscus.repo }}"
        data-repo-id="{{ .Site.Params.giscus.repoId }}"
        data-category="{{ .Site.Params.giscus.category }}"
        data-category-id="{{ .Site.Params.giscus.categoryId }}"
        data-mapping="{{ .Site.Params.giscus.mapping }}"
        data-strict="{{ .Site.Params.giscus.strict }}"
        data-reactions-enabled="{{ .Site.Params.giscus.reactionsEnabled }}"
        data-emit-metadata="{{ .Site.Params.giscus.emitMetadata }}"
        data-input-position="{{ .Site.Params.giscus.inputPosition }}"
        data-theme="{{ .Site.Params.giscus.theme }}"
        data-lang="{{ .Site.Params.giscus.lang }}"
        data-loading="{{ .Site.Params.giscus.loading }}"
        crossorigin="anonymous"
        async>
    </script>
</div>

<script>
(function () {
    let lastSent = null;

    // Derive the giscus theme from the site's current state (body.dark class).
    function getSiteTheme() {
        return document.body.classList.contains('dark') ? 'dark' : 'light';
    }

    // Post a setConfig message to the giscus iframe.
    function sendTheme(theme) {
        const iframe = document.querySelector('iframe.giscus-frame');
        if (!iframe || !iframe.contentWindow) return false;
        iframe.contentWindow.postMessage(
            { giscus: { setConfig: { theme: theme } } },
            'https://giscus.app'
        );
        lastSent = theme;
        return true;
    }

    // Ensure giscus matches the site theme — retries until the iframe is responsive.
    function syncTheme() {
        const target = getSiteTheme();
        if (sendTheme(target)) return;
        // Iframe not ready; retry.
        setTimeout(syncTheme, 150);
    }

    // Listen for the giscus "ready" signal to do an authoritative sync once it loads.
    window.addEventListener('message', (event) => {
        if (event.origin !== 'https://giscus.app') return;
        if (event.data && event.data.giscus) {
            // Any message from giscus means the iframe is live; resync.
            sendTheme(getSiteTheme());
        }
    });

    // Also keep polling briefly after page load, because the giscus iframe loads
    // lazily and `message` events may not include a first-paint signal.
    let pollsLeft = 60; // ~9 seconds at 150ms
    (function poll() {
        const target = getSiteTheme();
        if (lastSent !== target) sendTheme(target);
        if (--pollsLeft > 0) setTimeout(poll, 150);
    })();

    // React to site theme toggle.
    const observer = new MutationObserver(syncTheme);
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    // React to OS scheme change when user has no stored preference.
    if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (!localStorage.getItem('pref-theme')) syncTheme();
        });
    }
})();
</script>
{{ end }}
